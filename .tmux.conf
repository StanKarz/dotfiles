# ---------- Sensible defaults ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color support
set -g history-limit 50000                   # bigger scrollback buffer
set -s escape-time 0                         # snappier key response
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                    # panes too
set -g renumber-windows on                   # renumber when one is closed
set -g mouse on                              # clickable panes/windows, draggable borders
set -g set-clipboard on                      # OSC 52: tmux selections sync to system clipboard
set -g focus-events on                       # forward terminal focus events (vim/nvim autoread, etc.)
setw -g aggressive-resize on                 # resize to the smallest *attached* client, not the smallest session
setw -g mode-keys vi                         # vi keys in copy-mode: k/j, Ctrl-u/Ctrl-d, g/G, / to search, q to exit

# ---------- Key bindings ----------
# split panes using | and -
bind | split-window -h
bind 'S-\' split-window -h  # Shift+\ arrives as S-\ (not |) while an app has the extended keyboard protocol active (e.g. Claude Code)
bind - split-window -v
unbind '"'
unbind %

# switch panes using Ctrl+Shift+arrow without prefix
bind -n C-S-Left  select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up    select-pane -U
bind -n C-S-Down  select-pane -D

# ---------- Plugins (TPM) ----------
# Install TPM first: see README.md
# After editing this file, reload with: tmux source-file ~/.tmux.conf
# Then install plugins inside tmux with: prefix + I

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions: prefix + Ctrl-s / prefix + Ctrl-r
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'        # better clipboard integration
set -g @plugin 'catppuccin/tmux#latest'        # status bar theme

# Continuum: automatically restore last session on tmux start
set -g @continuum-restore 'on'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'              # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style "rounded"

# Window status: show window number + window name (not hostname)
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Initialize TPM — must come after all `set -g @plugin` lines, but before
# settings that read plugin-defined variables (e.g. catppuccin status below).
run '~/.tmux/plugins/tpm/tpm'

# Status bar (placed after TPM init so catppuccin variables are available)
# Layout: [session] ... [window list in middle] ... [application]
set -g status-right-length 100
set -g status-left-length 100
set -gF status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"

set -g allow-passthrough on
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
