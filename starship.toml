[aws]
disabled = true

[gcloud]
disabled = true

[directory]
read_only = " ≤░Ν╛"

[git_branch]
symbol = "ΎΡα "

[git_commit]
tag_symbol = ' ΎΡΤ '

[hostname]
ssh_symbol = "ΌυΒ "

[python]
symbol = "ΌΙ╡ "

[conda]
symbol = "ΎΕΝ "

[nodejs]
symbol = "Όεα "

[c]
symbol = "Όαη "

[package]
symbol = "≤░ΠΩ "

[battery]
full_symbol = 'ΏθΦΜ '
charging_symbol = 'έγκΎ╕Π '
discharging_symbol = 'ΏθΤΑ '
[os.symbols]
Macos = "ΎΝΓ "

# Custom modules for languages/frameworks without built-in starship support.
# Show only when matching files are present in the cwd.
[custom.html]
detect_extensions = ["html", "htm"]
symbol = "Όε╢ "
format = "[$symbol]($style)"
style = "bold #e34c26"
command = ""

[custom.css]
detect_extensions = ["css", "scss", "sass", "less"]
symbol = "ΌζΚ "
format = "[$symbol]($style)"
style = "bold #1572b6"
command = ""

[custom.sql]
detect_extensions = ["sql"]
symbol = "ΌεΗ "
format = "[$symbol]($style)"
style = "bold #00758f"
command = ""

[custom.bash]
detect_extensions = ["sh", "bash", "zsh"]
symbol = "ΌψΛ "
format = "[$symbol]($style)"
style = "bold green"
command = ""

[custom.astro]
detect_files = ["astro.config.mjs", "astro.config.ts", "astro.config.cjs", "astro.config.js"]
symbol = "ΏθγΑ "
format = "[$symbol]($style)"
style = "bold #ff5d01"
command = ""

# Marimo: only show when an explicit marimo signal is present (not every .py dir).
[custom.marimo]
symbol = "ΏθΞΔ "
format = "[$symbol]($style)"
style = "bold #16cdb6"
when = "grep -q marimo pyproject.toml 2>/dev/null || grep -lq 'import marimo' *.py 2>/dev/null"
command = ""

[custom.cpp]
detect_extensions = ["cpp", "hpp", "cc", "hh", "cxx", "hxx", "c++"]
symbol = "Όαζ "
format = "[$symbol]($style)"
style = "bold #00599c"
command = ""
